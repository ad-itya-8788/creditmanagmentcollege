<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - AgriCrm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:#f8f9fa; color:#343a40; }
        .header { background:#007BFF; color:#fff; padding:16px 20px; display:flex; align-items:center; gap:12px; }
        .header a { color:#fff; text-decoration:none; font-size:20px; }
        .header h1 { font-size:20px; font-weight:600; }
        .container { max-width:600px; margin:24px auto; padding:0 20px 40px; }
        .card { background:#fff; border-radius:16px; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
        h2 { font-size:20px; margin-bottom:6px; }
        .subtitle { color:#6c757d; font-size:14px; margin-bottom:24px; }
        .form-group { margin-bottom:18px; }
        label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
        input, textarea, select { width:100%; padding:12px 14px; border:1.5px solid #dbdbdb; border-radius:10px; font-size:15px; outline:none; font-family:inherit; transition:border-color 0.2s; }
        input:focus, textarea:focus, select:focus { border-color:#007BFF; }
        textarea { resize:vertical; min-height:120px; }
        .btn { width:100%; padding:13px; background:#007BFF; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-top:4px; transition:background 0.2s; }
        .btn:hover { background:#0056b3; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/"><i class="fas fa-arrow-left"></i></a>
        <h1>Send Feedback</h1>
    </div>
    <div class="container">
        <div class="card">
            <h2>We'd love to hear from you</h2>
            <p class="subtitle">Share your experience, report issues, or suggest improvements</p>
            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phone" placeholder="10-digit mobile number">
            </div>
            <div class="form-group">
                <label>Location *</label>
                <input type="text" id="location" placeholder="Your city / district">
            </div>
            <div class="form-group">
                <label>Feedback Type</label>
                <select id="queryType">
                    <option value="">-- Select Type --</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="support">Support</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message *</label>
                <textarea id="message" placeholder="Describe your feedback in detail..."></textarea>
            </div>
            <button class="btn" onclick="submitFeedback()">Submit Feedback</button>
        </div>
    </div>
    <script>
        async function submitFeedback() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const location = document.getElementById('location').value.trim();
            const message = document.getElementById('message').value.trim();
            const queryType = document.getElementById('queryType').value;
            if (!name || !phone || !location || !message) {
                Swal.fire('Required Fields', 'Please fill in all required fields marked with *', 'warning');
                return;
            }
            try {
                const resp = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, location, queryType, message })
                });
                const data = await resp.json();
                if (data.success) {
                    Swal.fire({ title: 'Thank You!', text: 'Your feedback has been submitted successfully.', icon: 'success', confirmButtonColor: '#007BFF' });
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('location').value = '';
                    document.getElementById('message').value = '';
                } else {
                    Swal.fire('Error', data.message || 'Failed to submit feedback', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Network error. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
