<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriCrm.in</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f7f8fa; min-height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .top-bar {
            background: #fff; border-bottom: 1px solid #e5e7eb;
            height: 52px; padding: 0 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .top-bar img { height: 32px; object-fit: contain; }
        .top-bar .btn-signup {
            font-size: 0.82rem; font-weight: 600; color: #1a6b3c;
            text-decoration: none; padding: 0.35rem 0.9rem;
            border: 1.5px solid #1a6b3c; border-radius: 8px;
            transition: all 0.15s;
        }
        .top-bar .btn-signup:hover { background: #1a6b3c; color: white; }

        /* Page */
        .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }

        /* Card */
        .card {
            background: #fff; border-radius: 16px;
            padding: 2.25rem 2rem; width: 100%; max-width: 400px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }
        .card-logo { text-align: center; margin-bottom: 1.75rem; }
        .card-logo img { height: 44px; object-fit: contain; }
        .card-logo h2 { font-size: 1.15rem; font-weight: 700; color: #111; margin-top: 0.6rem; }
        .card-logo p { font-size: 0.78rem; color: #9ca3af; margin-top: 0.2rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 0.85rem; }
        .input-wrap input {
            width: 100%; padding: 0.65rem 0.9rem 0.65rem 2.3rem;
            border: 1.5px solid #e5e7eb; border-radius: 9px;
            font-size: 0.88rem; font-family: 'Poppins', sans-serif;
            color: #111; background: #fafafa; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrap input:focus { outline: none; border-color: #1a6b3c; background: #fff; box-shadow: 0 0 0 3px rgba(26,107,60,0.1); }
        .forgot { text-align: right; margin-top: 0.3rem; }
        .forgot a { font-size: 0.75rem; color: #6b7280; text-decoration: none; }
        .forgot a:hover { color: #1a6b3c; }

        .btn-main {
            width: 100%; padding: 0.75rem; background: #1a6b3c;
            color: white; border: none; border-radius: 9px;
            font-size: 0.92rem; font-weight: 600; cursor: pointer;
            font-family: 'Poppins', sans-serif; margin-top: 0.5rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-main:hover { background: #155e34; transform: translateY(-1px); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .divider { text-align: center; margin: 1rem 0; font-size: 0.78rem; color: #d1d5db; }
        .alt-link { text-align: center; font-size: 0.82rem; color: #6b7280; }
        .alt-link a { color: #1a6b3c; font-weight: 600; text-decoration: none; }

        /* Footer */
        footer { text-align: center; padding: 1rem; font-size: 0.72rem; color: #9ca3af; border-top: 1px solid #f3f4f6; }
    </style>
</head>
<body>

<header class="top-bar">
    <a href="/"><img src="/img/navlogoagri.png" alt="AgriCRM" onerror="this.style.display='none'"></a>
    <a href="/signup" class="btn-signup">Sign Up</a>
</header>

<div class="page">
    <div class="card">
        <div class="card-logo">
            <img src="/img/navlogoagri.png" alt="AgriCRM" onerror="this.style.display='none'">
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email or Phone Number</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="identifier" name="identifier" placeholder="Enter email or phone" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <div class="forgot"><a href="/forgot-password">Forgot password?</a></div>
            </div>
            <button type="submit" class="btn-main" id="loginBtn">Sign In</button>
        </form>

        <div class="divider">— or —</div>
        <div class="alt-link">New here? <a href="/signup">Create account</a></div>
    </div>
</div>

<footer>
    &copy; AgriCrm.in &nbsp;&bull;&nbsp; Agricultural Credit Management
</footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script>
    // Agar user pehle se logged in hai toh dashboard pe bhejo
    (async () => {
        try {
            const r = await fetch('/auth/check-auth', { credentials: 'same-origin' });
            const d = await r.json();
            if (d.authenticated) window.location.replace('/dashboard');
        } catch {}
    })();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;
        if (!identifier || !password) {
            Swal.fire({ icon: 'error', title: 'Missing Info', text: 'Please enter email/phone and password.', confirmButtonColor: '#1a6b3c' });
            return;
        }
        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Signing In...';
        btn.disabled = true;
        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                body: new URLSearchParams({ identifier, password }),
                credentials: 'same-origin'
            });
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                Swal.fire({ icon: 'error', title: 'Server Error', text: 'Unexpected response. Please try again.', confirmButtonColor: '#1a6b3c' });
                return;
            }
            const data = await response.json();
            if (response.ok) {
                await Swal.fire({ icon: 'success', title: 'Login Successful!', timer: 1000, showConfirmButton: false });
                window.location.replace('/dashboard');
            } else {
                Swal.fire({ icon: 'error', title: 'Login Failed', text: data.error || data.message || 'Invalid credentials.', confirmButtonColor: '#1a6b3c' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Connection Error', text: 'Could not connect. Check your internet.', confirmButtonColor: '#1a6b3c' });
        } finally {
            btn.textContent = 'Sign In';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
