<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AgriCrm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:#f8f9fa; color:#343a40; min-height:100vh; display:flex; flex-direction:column; }
        .header { background:#fff; border-bottom:1px solid #dbdbdb; padding:14px 20px; display:flex; align-items:center; gap:12px; }
        .header a { color:#343a40; text-decoration:none; font-size:20px; }
        .header h1 { font-size:18px; font-weight:600; }
        .main { flex:1; display:flex; align-items:center; justify-content:center; padding:30px 20px; }
        .card { background:#fff; border-radius:16px; padding:40px 32px; box-shadow:0 4px 20px rgba(0,0,0,0.08); width:100%; max-width:420px; }
        .icon-wrap { width:70px; height:70px; background:rgba(0,123,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
        .icon-wrap i { font-size:28px; color:#007BFF; }
        h2 { text-align:center; font-size:22px; margin-bottom:8px; }
        p { text-align:center; color:#6c757d; font-size:14px; margin-bottom:24px; }
        .form-group { margin-bottom:16px; }
        label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#343a40; }
        input { width:100%; padding:12px 16px; border:1.5px solid #dbdbdb; border-radius:10px; font-size:15px; outline:none; transition:border-color 0.2s; }
        input:focus { border-color:#007BFF; }
        .btn { width:100%; padding:13px; background:#007BFF; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; transition:background 0.2s; }
        .btn:hover { background:#0056b3; }
        .back-link { text-align:center; margin-top:20px; font-size:14px; color:#6c757d; }
        .back-link a { color:#007BFF; text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/login"><i class="fas fa-arrow-left"></i></a>
        <h1>Forgot Password</h1>
    </div>
    <div class="main">
        <div class="card">
            <div class="icon-wrap">
                <i class="fas fa-lock"></i>
            </div>
            <h2>Reset Password</h2>
            <p>Enter your registered email address. We'll send you instructions to reset your password.</p>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <button class="btn" onclick="submitReset()">Send Reset Link</button>
            <div class="back-link">
                Remember your password? <a href="/login">Sign In</a>
            </div>
        </div>
    </div>
    <script>
        function submitReset() {
            const email = document.getElementById('email').value;
            if (!email) {
                Swal.fire('Error', 'Please enter your email address', 'error');
                return;
            }
            Swal.fire({
                title: 'Request Sent',
                text: 'If an account exists with this email, you will receive reset instructions shortly. Please contact your administrator.',
                icon: 'info',
                confirmButtonColor: '#007BFF'
            });
        }
    </script>
</body>
</html>
